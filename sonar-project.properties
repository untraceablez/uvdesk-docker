# SonarQube configuration for uvdesk-docker (FR-012/017; Constitution Principle V).
#
# Scope: ONLY this repository's own authored artifacts (automation scripts and
# pipeline config). Upstream UVdesk source is fetched by release and is NEVER
# analyzed here — the extraction/work dir is excluded.

sonar.projectKey=uvdesk-docker
sonar.projectName=uvdesk-docker

# Analyze our authored sources only.
sonar.sources=scripts,Jenkinsfile,Makefile,sonar-project.properties,docs
sonar.tests=tests

# Never analyze fetched upstream source, build scratch, or reports.
sonar.exclusions=.work/**,build/**,**/*.tar.gz,specs/**,.specify/**

# Shell has no native SonarQube analyzer; import ShellCheck findings as
# external issues (produced by scripts/quality-gate.sh).
sonar.externalIssuesReportPaths=shellcheck-report.json

# Enable secret detection over the whole repo (guards leaked registry creds).
sonar.sca.enabled=true

sonar.sourceEncoding=UTF-8
